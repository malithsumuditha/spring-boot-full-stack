services:
  db:
    container_name: postgres
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Malith10a
      POSTGRES_DB: customer
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5342:5432"
    networks:
      - db
    restart: unless-stopped

  spring-api:
    container_name: spring-api
    image: malithpuhulwellage/spring-api
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/customer
    ports:
      - "8088:8080"
    networks:
      - db
    depends_on:
      - db
    restart: unless-stopped

networks:
  db:
    driver: bridge

volumes:
  db_data:
